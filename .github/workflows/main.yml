name: CI/CD Pipeline

on:
  push:
    branches: master
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build Vue Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build blog-cms
        working-directory: ./NBlog-master/blog-cms
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Build blog-view
        working-directory: ./NBlog-master/blog-view
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            NBlog-master/blog-cms/dist
            NBlog-master/blog-view/dist
          retention-days: 3

  build-java:
    name: Build Java Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: ./blog-api
        run: mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-jar
          path: blog-api/target/*.jar
          retention-days: 3

  build-python:
    name: Build Python Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-code
          path: fastApiProject
          retention-days: 3

  deploy:
    name: Deploy to Server
    needs: [build-frontend, build-java, build-python]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy Frontend
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # 复制 CMS 前端文件
          rsync -av --delete \
            artifacts/frontend-dist/blog-cms/dist/ \
            $SERVER_USER@$SERVER_HOST:/root/blog/frontend/cms/dist/
          
          # 复制 View 前端文件
          rsync -av --delete \
            artifacts/frontend-dist/blog-view/dist/ \
            $SERVER_USER@$SERVER_HOST:/root/blog/frontend/view/dist/
          
          # 重载 Nginx
          ssh $SERVER_USER@$SERVER_HOST "docker exec blog-nginx nginx -s reload"

      - name: Deploy Java
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # 覆盖 jar 包
          scp artifacts/java-jar/*.jar $SERVER_USER@$SERVER_HOST:/root/blog/backend/java/blog-api-0.0.1.jar
          
          # 重启 Java 服务
          ssh $SERVER_USER@$SERVER_HOST "docker restart blog-java"

      - name: Deploy Python
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # 同步 Python 代码
          rsync -av --delete \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.git' \
            --exclude='.idea' \
            artifacts/python-code/fastApiProject/ \
            $SERVER_USER@$SERVER_HOST:/root/blog/backend/python/fastApiProject/
          
          # 重启 Python 服务
          ssh $SERVER_USER@$SERVER_HOST "docker restart blog-python"
