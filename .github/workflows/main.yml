name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build Vue Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'  # 启用 npm 缓存加速构建

      - name: Build blog-cms
        working-directory: ./NBlog-master/blog-cms
        run: |
          npm install
          npm run build

      - name: Build blog-view
        working-directory: ./NBlog-master/blog-view
        run: |
          npm install
          npm run build

      - name: List dist files (debug)
        run: |
          ls -la NBlog-master/blog-cms/dist/ || echo "cms dist not found"
          ls -la NBlog-master/blog-view/dist/ || echo "view dist not found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            NBlog-master/blog-cms/dist
            NBlog-master/blog-view/dist
          retention-days: 3
          
  build-java:
    name: Build Java Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: ./blog-api
        run: mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-jar
          path: blog-api/target/*.jar
          retention-days: 3

  build-python:
    name: Build Python Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-code
          path: fastApiProject
          retention-days: 3

